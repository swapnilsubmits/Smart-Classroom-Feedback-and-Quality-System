<!DOCTYPE html>
<html>
<head>
    <title>Debug Test - Submit Button</title>
    <style>
        body { font-family: Arial; padding: 2rem; max-width: 600px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 1rem 2rem; border-radius: 8px; margin: 1rem 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 0.5rem 1rem; margin: 0.5rem 0; font-size: 1rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        code { background: #f4f4f4; padding: 0.2rem 0.5rem; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔍 Debug Test - Submit Button</h1>
    
    <div class="card info">
        <h3>Backend Health Check</h3>
        <p>Status: <strong id="backendStatus">Checking...</strong></p>
        <button onclick="testBackendHealth()">🔄 Recheck Backend</button>
    </div>

    <div class="card">
        <h3>Test Form Submission</h3>
        <form id="testForm">
            <div>
                <label>Course:
                    <select id="course" required>
                        <option value="">-- Select --</option>
                        <option value="CS101">CS101</option>
                    </select>
                </label>
            </div>
            <div>
                <label>Rating:
                    <input type="radio" name="rating" value="5" required> 5 stars
                </label>
            </div>
            <div>
                <label>Feedback:
                    <textarea id="feedback" required>Test feedback</textarea>
                </label>
            </div>
            <button type="submit">📝 Submit Test Feedback</button>
        </form>
        <p id="testResult"></p>
    </div>

    <div class="card info">
        <h3>Console Logs</h3>
        <p style="font-family: monospace; background: #f4f4f4; padding: 1rem; border-radius: 5px; max-height: 200px; overflow-y: auto;" id="logs"></p>
    </div>

    <script>
        // Redirect console to page
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;
        console.log = function(...args) {
            logs.push('✅ ' + args.join(' '));
            updateLogs();
            originalLog(...args);
        };
        console.error = function(...args) {
            logs.push('❌ ' + args.join(' '));
            updateLogs();
            originalError(...args);
        };

        function updateLogs() {
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = logs.map(l => '<div>' + l + '</div>').join('');
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        async function testBackendHealth() {
            const status = document.getElementById('backendStatus');
            try {
                const res = await fetch('http://localhost:5000/health');
                if (res.ok) {
                    const data = await res.json();
                    console.log('Backend is HEALTHY:', data);
                    status.innerHTML = '✅ Connected';
                    status.style.color = 'green';
                } else {
                    console.error('Backend returned', res.status);
                    status.innerHTML = '❌ Error: ' + res.status;
                    status.style.color = 'red';
                }
            } catch (e) {
                console.error('Cannot reach backend:', e.message);
                status.innerHTML = '❌ Not reachable';
                status.style.color = 'red';
            }
        }

        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = document.getElementById('testResult');
            
            try {
                const data = {
                    course: document.getElementById('course').value,
                    rating: parseInt(document.querySelector('input[name="rating"]:checked').value),
                    feedback_text: document.getElementById('feedback').value
                };
                console.log('Submitting:', data);
                
                const res = await fetch('http://localhost:5000/submit-feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const respData = await res.json();
                console.log('Response:', respData);
                
                if (res.ok) {
                    result.innerHTML = '<div class="success">✅ Success! ID: ' + respData.id + '</div>';
                } else {
                    result.innerHTML = '<div class="error">❌ Error: ' + respData.error + '</div>';
                }
            } catch (e) {
                console.error('Submission failed:', e);
                result.innerHTML = '<div class="error">❌ ' + e.message + '</div>';
            }
        });

        // Check backend on load
        window.addEventListener('DOMContentLoaded', () => {
            testBackendHealth();
        });
    </script>
</body>
</html>
