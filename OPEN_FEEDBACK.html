<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Feedback - Quick Launch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .status {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            color: #555;
        }
        
        .status-item {
            margin: 10px 0;
            font-size: 0.95em;
        }
        
        .status-item.checking {
            color: #ff9800;
        }
        
        .status-item.ok {
            color: #4caf50;
        }
        
        .status-item.error {
            color: #f44336;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #efefef;
            border-color: #999;
        }
        
        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border-radius: 4px;
            color: #0d47a1;
        }
        
        .info strong {
            display: block;
            margin-bottom: 8px;
        }
        
        .info ul {
            margin-left: 20px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Classroom Feedback</h1>
        <p class="subtitle">Smart Feedback System</p>
        
        <div class="status">
            <div class="status-item checking" id="status">Checking server status...</div>
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="openBtn" onclick="openFrontend()" disabled>
                ▶ Open Feedback System
            </button>
            <button class="btn-secondary" onclick="checkStatus()">
                🔄 Check Status Again
            </button>
        </div>
        
        <div class="info">
            <strong>📌 Setup Complete!</strong>
            <ul>
                <li>DoubleClick <code>START_PROJECT.bat</code> to start server</li>
                <li>Then click the button below to open the system</li>
                <li>Your data is saved in <code>backend/feedbacks.json</code></li>
            </ul>
        </div>
    </div>
    
    <script>
        let backendRunning = false;
        
        function checkStatus() {
            document.getElementById('status').innerText = 'Checking server...';
            document.getElementById('status').className = 'status-item checking';
            document.getElementById('openBtn').disabled = true;
            
            fetch('http://localhost:5000/health', {mode:'cors'})
                .then(res => {
                    if (res.ok) {
                        document.getElementById('status').innerText = '✓ Server is running at http://localhost:5000';
                        document.getElementById('status').className = 'status-item ok';
                        document.getElementById('openBtn').disabled = false;
                        backendRunning = true;
                        // redirect automatically after short delay
                        setTimeout(() => {
                            window.location.href = 'frontend/index.html';
                        }, 300);
                    } else {
                        throw new Error('Server responded with error');
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerHTML = 
                        '✗ Backend not running<br><small>Double-click START_PROJECT.bat first</small>';
                    document.getElementById('status').className = 'status-item error';
                    document.getElementById('openBtn').disabled = true;
                    backendRunning = false;
                    // retry automatically
                    setTimeout(checkStatus, 1000);
                });
        }
        
        function openFrontend() {
            if (!backendRunning) {
                alert('Server not running. Please double-click START_PROJECT.bat first.');
                return;
            }
            
            // Simple relative path - works with both file:// and http://
            window.location.href = 'frontend/index.html';
        }
        
        // Check status on load
        window.addEventListener('load', () => {
            setTimeout(checkStatus, 500);
        });
    </script>
</body>
</html>
